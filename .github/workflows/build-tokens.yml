name: Tokens - Build CSS + JS

# Run automatically when token JSON files change, or manually
on:
  push:
    branches:
      - main
    paths:
      - 'tokens/**/*.json'
  workflow_dispatch:

# Allow the workflow to commit and push dist/ back to the repo
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-tokens:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build tokens
        run: npm run build-tokens

      - name: Commit and push dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: build tokens [skip ci]"
          git push
