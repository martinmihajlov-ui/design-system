name: Sync React Icon Components

# Run manually from GitHub by clicking a button
on:
  workflow_dispatch:

# Allow the workflow to commit and push back to the repo
permissions:
  contents: write

jobs:
  sync-react-icons:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Export icons from Figma
        run: node scripts/export-icons.js
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: oWyNqsZJKJYF8SpZsBPb9P
          FIGMA_ICONS_NODE_ID: "106:728"

      - name: Optimize SVGs
        run: npm run optimize-icons

      - name: Build React components
        run: npm run build-react-icons

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add icons/svg/ icons/react/
          git diff --staged --quiet || git commit -m "chore: sync React icon components from Figma"
          git push
