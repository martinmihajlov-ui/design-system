name: Tokens - Typography (Figma Sync)

# Run manually from GitHub by clicking a button
on:
  workflow_dispatch:

# Allow the workflow to commit and push back to the repo
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-typography-tokens:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Export typography tokens from Figma
        run: node scripts/export-typography-tokens.js
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: oWyNqsZJKJYF8SpZsBPb9P

      - name: Build CSS + JS from updated tokens
        run: npm run build-tokens

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tokens/typography-primitives.json tokens/typography-aliases-desktop.json tokens/typography-aliases-mobile.json dist/
          git diff --staged --quiet || git commit -m "chore: sync typography tokens from Figma [skip ci]"
          git push
